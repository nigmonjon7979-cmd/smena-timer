name: Aniq vaqt taymeri
on:
  schedule:
    - cron: '37 0,1,2 * * *'
    - cron: '37 10,11,12 * * *'
  workflow_dispatch:
    inputs:
      offset:
        description: 'Soniya siljishi'
        default: '0'
        required: false

jobs:
  timer:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Belgilangan soniyada signal berish
        env:
          PING_URL: ${{ secrets.PING_URL }}
          OFFSET_IN: ${{ inputs.offset }}
        run: |
          OFFSET="${OFFSET_IN:-$(( GITHUB_RUN_ID % 40 ))}"
          echo "Siljish: ${OFFSET}s"
          for T in "03:00" "04:00" "05:00" "13:00" "14:00" "15:00"; do
            target=$(( $(date -u -d "today $T" +%s) + OFFSET ))
            now=$(date -u +%s)
            diff=$(( target - now ))
            if [ $diff -gt 9000 ]; then echo "skip $T (uzoq)"; continue; fi
            if [ $diff -lt -1200 ]; then echo "skip $T (o'tgan)"; continue; fi
            if [ $diff -gt 0 ]; then echo "kutish: $T+${OFFSET}s gacha $diff soniya"; sleep $diff; fi
            curl -s --max-time 30 "$PING_URL" || true
            echo "$(date -u '+%H:%M:%S') UTC — signal berildi ($T)"
          done
